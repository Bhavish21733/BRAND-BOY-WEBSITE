<script>
(function() {
  // Highlight active link (for both desktop and mobile)
  function highlightActiveNav() {
    // normalize URLs
    const path = window.location.pathname.split('/').pop().toLowerCase() || 'index.html';
    [
      ['nav-home','index.html'],
      ['nav-services','services.html'],
      ['nav-contact','contact.html'],
      ['mobile-nav-home','index.html'],
      ['mobile-nav-services','services.html'],
      ['mobile-nav-contact','contact.html']
    ].forEach(function(pair){
      const el = document.getElementById(pair[0]);
      if(el){
        if(pair[1] === path){
          el.classList.add('active');
          el.setAttribute('aria-current', 'page');
        } else {
          el.classList.remove('active');
          el.removeAttribute('aria-current');
        }
      }
    });
  }
  highlightActiveNav();

  // Hamburger menu behavior
  const hamburger = document.querySelector('.navbar-hamburger');
  const navLinksMobile = document.getElementById('mobile-nav-links');
  // On small screens, swap desktop links to hidden and use mobile menu
  function handleNavbarResize(){
    if(window.innerWidth <= 830){
      navLinksMobile.style.display = "flex";
    } else {
      navLinksMobile.style.display = "none";
      navLinksMobile.classList.remove('mobile-open');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', "false");
    }
  }
  handleNavbarResize();
  window.addEventListener('resize', handleNavbarResize);

  hamburger.addEventListener('click', function(){
    const menuOpen = navLinksMobile.classList.toggle('mobile-open');
    hamburger.classList.toggle('open', menuOpen);
    hamburger.setAttribute('aria-expanded', menuOpen ? "true":"false");
  });

  // Close mobile nav when clicking a link (improves UX)
  Array.from(navLinksMobile.querySelectorAll('a')).forEach(function(link){
    link.addEventListener('click', function(){
      navLinksMobile.classList.remove('mobile-open');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', "false");
    });
  });
})();
</script>
